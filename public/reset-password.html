<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — PrivaBuy</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#f5f3ef; --fg:#1a1814; --muted:rgba(26,24,20,0.52); --border:rgba(26,24,20,0.10); --accent:#7c5cbf; --r:14px; --sans:'Barlow',sans-serif; --serif:'Instrument Serif',serif; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--fg); font-family:var(--sans); font-weight:300; min-height:100vh; display:flex; flex-direction:column; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:20px 40px; border-bottom:1px solid var(--border); background:rgba(245,243,239,0.92); }
  .logo { font-family:var(--serif); font-style:italic; font-size:22px; color:var(--fg); text-decoration:none; }
  .logo span { color:var(--accent); }
  .page { max-width:480px; margin:0 auto; padding:60px 24px; width:100%; }
  .card { background:rgba(255,255,255,0.72); border:1px solid var(--border); border-radius:16px; padding:32px; box-shadow:0 2px 12px rgba(26,24,20,0.06); }
  .page-title { font-family:var(--serif); font-style:italic; font-size:32px; margin-bottom:8px; color:var(--fg); }
  .page-sub { font-size:14px; color:var(--muted); margin-bottom:24px; line-height:1.6; }
  .form-group { margin-bottom:16px; }
  .form-label { display:block; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
  .form-input { width:100%; background:rgba(255,255,255,0.8); border:1px solid rgba(26,24,20,0.15); border-radius:10px; padding:11px 13px; color:var(--fg); font-family:var(--sans); font-size:14px; outline:none; transition:border-color 0.2s; }
  .form-input:focus { border-color:rgba(124,92,191,0.5); box-shadow:0 0 0 3px rgba(124,92,191,0.08); }
  .btn { display:flex; align-items:center; justify-content:center; width:100%; background:#1a1814; color:#f5f3ef; border:none; border-radius:9999px; padding:14px; font-family:var(--sans); font-size:15px; font-weight:500; cursor:pointer; margin-top:8px; transition:all 0.2s; }
  .btn:hover { background:#2d2925; }
  .btn:disabled { opacity:0.5; cursor:not-allowed; }
  .alert { padding:12px 15px; border-radius:10px; font-size:13px; line-height:1.5; margin-bottom:16px; }
  .alert-error { background:rgba(220,38,38,0.06); border:1px solid rgba(220,38,38,0.15); color:#dc2626; }
  .alert-success { background:rgba(42,158,124,0.06); border:1px solid rgba(42,158,124,0.15); color:#2a9e7c; }
</style>
</head>
<body>
<div class="topbar">
  <a href="/" class="logo">Priva<span>Buy</span></a>
</div>
<div class="page">
  <div class="card">
    <div class="page-title">Reset Password</div>
    <div class="page-sub">Enter your new password below.</div>
    <div id="alert-box" style="display:none"></div>
    <div id="form-section">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <div style="position:relative;">
          <input class="form-input" id="password-input" type="password" placeholder="••••••••" style="padding-right:40px;">
          <button onclick="togglePwd('password-input','eye1')" type="button" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;">
            <svg id="eye1" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div style="position:relative;">
          <input class="form-input" id="confirm-input" type="password" placeholder="••••••••" style="padding-right:40px;">
          <button onclick="togglePwd('confirm-input','eye2')" type="button" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;">
            <svg id="eye2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button class="btn" id="submit-btn" onclick="resetPassword()">Set New Password →</button>
    </div>
    <div id="success-section" style="display:none;text-align:center;padding:20px 0;">
      <div style="font-size:32px;margin-bottom:12px;">✓</div>
      <div style="font-size:18px;font-weight:600;margin-bottom:8px;">Password Updated</div>
      <div style="color:var(--muted);margin-bottom:24px;">You can now sign in with your new password.</div>
      <a href="/app?role=seller" style="display:inline-flex;align-items:center;gap:6px;background:#1a1814;color:#f5f3ef;padding:12px 24px;border-radius:9999px;font-family:Barlow,sans-serif;font-size:14px;font-weight:500;text-decoration:none;">Go to Sign In →</a>
    </div>
  </div>
</div>
<script>
const API = 'https://web-production-534ed.up.railway.app';
const token = new URLSearchParams(window.location.search).get('token');

if(!token) {
  document.getElementById('alert-box').style.display = 'block';
  document.getElementById('alert-box').innerHTML = '<div class="alert alert-error">Invalid reset link. Please request a new one.</div>';
  document.getElementById('form-section').style.display = 'none';
}

function togglePwd(inputId, eyeId) {
  const input = document.getElementById(inputId);
  const eye = document.getElementById(eyeId);
  if(input.type === 'password') {
    input.type = 'text';
    eye.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    input.type = 'password';
    eye.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

async function resetPassword() {
  const password = document.getElementById('password-input').value;
  const confirm = document.getElementById('confirm-input').value;
  const btn = document.getElementById('submit-btn');

  if(!password || password.length < 6) {
    showAlert('Password must be at least 6 characters.', 'error'); return;
  }
  if(password !== confirm) {
    showAlert('Passwords do not match.', 'error'); return;
  }

  btn.textContent = 'Updating...';
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/sellers/reset-password`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token, password})
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || 'Reset failed');
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('success-section').style.display = 'block';
  } catch(err) {
    showAlert(err.message, 'error');
    btn.textContent = 'Set New Password →';
    btn.disabled = false;
  }
}

function showAlert(msg, type) {
  const el = document.getElementById('alert-box');
  el.style.display = 'block';
  el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
}
</script>
</body>
</html>
